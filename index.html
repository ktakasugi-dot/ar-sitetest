<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Multi GLB Switcher</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
      body {
        margin: 0;
        font-family: sans-serif;
        background: #111;
        color: #fff;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      header {
        padding: 12px 16px;
        background: #222;
      }
      main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 12px;
      }
      model-viewer {
        width: 100%;
        height: 70vh;
        background: #222;
        border-radius: 12px;
      }
      .buttons {
        display: flex;
        gap: 8px;
        padding: 12px;
        flex-wrap: wrap;
        justify-content: center;
        background: #1a1a1a;
      }
      button {
        padding: 10px 14px;
        border: none;
        border-radius: 8px;
        background: #4a90e2;
        color: white;
        font-size: 14px;
      }
      button:hover {
        background: #3578c9;
      }
    </style>
  </head>
  <body>
    <header>
      <strong>Multi GLB Switcher</strong>
    </header>

    <main>
      <model-viewer
        id="viewer"
        src="models/model1.glb"
        ios-src="models/model1.usdz"
        alt="3D model"
        camera-controls
        ar
        ar-modes="webxr scene-viewer quick-look"
        environment-image="neutral"
        shadow-intensity="1"
        auto-rotate
      ></model-viewer>
    </main>

    <div class="buttons">
      <button onclick="loadModel('models/model1.glb', 'models/model1.usdz')">Model 1</button>
      <button onclick="loadModel('models/model2.glb', 'models/model2.usdz')">Model 2</button>
      <button onclick="loadModel('models/model3.glb', 'models/model3.usdz')">Model 3</button>
    </div>

    <script>
      const viewer = document.getElementById('viewer');

      function loadModel(glb, usdz) {
        viewer.src = glb;
        viewer.setAttribute('ios-src', usdz);
      }

      window.loadModel = loadModel;
    </script>
  </body>
</html>
